<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lendas de Eldoria</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to bottom,#1a1a2e,#0f3460);
color:white;
text-align:center;
}

header{
padding:30px;
font-size:35px;
background:#16213e;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:gold;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:orange;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#16213e;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
width:220px;
}

.barra{
height:20px;
background:red;
border-radius:10px;
margin:10px auto;
width:200px;
}
</style>
</head>

<body>

<header>LENDAS DE ELDORIA</header>

<div id="menu" class="section active">
<h2>O Dragão Rubro despertou.</h2>
<button onclick="mostrar('classes')">Começar Jornada</button>
</div>

<div id="classes" class="section">
<h2>Escolha sua Classe</h2>

<div class="card">
<h3>⚔ Guerreiro</h3>
<p>Vida alta, dano médio</p>
<button onclick="iniciar('Guerreiro',120,15)">Escolher</button>
</div>

<div class="card">
<h3>🔥 Mago</h3>
<p>Vida média, dano alto</p>
<button onclick="iniciar('Mago',90,25)">Escolher</button>
</div>

<div class="card">
<h3>🏹 Arqueiro</h3>
<p>Equilibrado e ágil</p>
<button onclick="iniciar('Arqueiro',100,18)">Escolher</button>
</div>

</div>

<div id="jogo" class="section">
<h2 id="classeNome"></h2>

<p>Vida do Herói:</p>
<div class="barra" id="vidaHeroi"></div>

<p>Vida do Dragão:</p>
<div class="barra" id="vidaDragao"></div>

<p id="mensagem"></p>

<button onclick="atacar()">Atacar</button>
<button onclick="especial()">Ataque Especial</button>
<button onclick="loja()">Visitar Loja (10 ouro)</button>
<button onclick="reiniciar()">Recomeçar</button>
</div>

<script>
let vidaHeroi;
let vidaDragao;
let danoBase;
let ouro=20;

function mostrar(secao){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(secao).classList.add("active");
}

function iniciar(classe,vida,dano){
vidaHeroi=vida;
vidaDragao=150;
danoBase=dano;
document.getElementById("classeNome").innerText="Classe: "+classe+" | Ouro: "+ouro;
atualizarBarras();
mostrar("jogo");
}

function atualizarBarras(){
document.getElementById("vidaHeroi").style.width=vidaHeroi+"px";
document.getElementById("vidaDragao").style.width=vidaDragao+"px";
}

function atacar(){
let dano=Math.floor(Math.random()*danoBase);
vidaDragao-=dano;

let contra=Math.floor(Math.random()*20);
vidaHeroi-=contra;

document.getElementById("mensagem").innerText=
"Você causou "+dano+" de dano. Dragão causou "+contra+"!";

verificar();
atualizarBarras();
}

function especial(){
let dano=Math.floor(Math.random()*40)+20;
vidaDragao-=dano;
vidaHeroi-=15;

document.getElementById("mensagem").innerText=
"Ataque especial! "+dano+" de dano! Mas você perdeu 15 de vida.";

verificar();
atualizarBarras();
}

function loja(){
if(ouro>=10){
ouro-=10;
vidaHeroi+=20;
document.getElementById("mensagem").innerText="Você comprou poção! +20 vida.";
}else{
document.getElementById("mensagem").innerText="Ouro insuficiente!";
}
document.getElementById("classeNome").innerText+=" | Ouro: "+ouro;
atualizarBarras();
}

function verificar(){
if(vidaDragao<=0){
document.getElementById("mensagem").innerText="VOCÊ DERROTOU O DRAGÃO! Eldoria está salva!";
}
if(vidaHeroi<=0){
document.getElementById("mensagem").innerText="Você caiu... O Dragão domina Eldoria.";
}
}

function reiniciar(){
location.reload();
}
</script>

</body>
</html>
